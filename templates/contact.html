<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contact-card {
            background: #ffffff;
            width: 420px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .contact-card h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .info {
            margin: 15px 0;
            padding: 12px;
            background: #f4f6f8;
            border-radius: 8px;
            font-size: 15px;
            color: #444;
        }

        .info span {
            font-weight: bold;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #1e90ff;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-link:hover {
            background: #0b63c7;
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <h2>Contact Details</h2>

        <div class="info">
            <span>Email:</span> craviteja135@gmail.com
        </div>

        <div class="info">
            <span>Phone:</span> 8328190267
        </div>

        <a href="/" class="back-link">← Back to Home</a>
    </div>

</body>
</html>
